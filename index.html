<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 화면 정의서 v6</title>
<style>
* { box-sizing:border-box; }
body { display:flex; flex-direction:column; height:100vh; margin:0; font-family:'Noto Sans KR',sans-serif; background:#e9ecef; overflow:hidden; }
.editor-toolbar { background:#111; color:white; display:flex; flex-direction:column; z-index:10000; flex-shrink:0; }
.toolbar-top { display:flex; padding:8px 16px; align-items:center; gap:6px; border-bottom:1px solid #333; flex-wrap:wrap; min-height:52px; }
.toolbar-bottom { display:flex; padding:0; background:#1a1a1a; overflow-x:auto; align-items:stretch; }
button { padding:7px 12px; font-size:12px; font-weight:bold; border:none; border-radius:5px; cursor:pointer; transition:0.15s; flex-shrink:0; white-space:nowrap; }
.btn-capture   { background:#10b981; color:#fff; } .btn-capture:hover   { background:#059669; }
.btn-add-blank { background:#8b5cf6; color:#fff; } .btn-add-blank:hover { background:#7c3aed; }
.btn-del-page  { background:#ef4444; color:#fff; } .btn-del-page:hover  { background:#dc2626; }
.btn-dup-page  { background:#f59e0b; color:#fff; } .btn-dup-page:hover  { background:#d97706; }
.btn-edit-html { background:#6366f1; color:#fff; } .btn-edit-html:hover { background:#4f46e5; }
.btn-add-box   { background:#d93025; color:#fff; } .btn-add-box:hover   { background:#b91c1c; }
.btn-exp-json  { background:#059669; color:#fff; } .btn-exp-json:hover  { background:#047857; }
.btn-exp-html  { background:#4f46e5; color:#fff; } .btn-exp-html:hover  { background:#3730a3; }
#tool-selector { padding:6px 8px; border-radius:5px; font-weight:bold; background:#333; color:#fff; border:1px solid #555; outline:none; font-size:12px; }
.status-text { font-size:11px; color:#aaa; margin-left:6px; max-width:240px; line-height:1.3; }
.resize-controls { display:flex; align-items:center; gap:4px; font-size:12px; color:#ccc; background:#222; padding:4px 10px; border-radius:6px; border:1px solid #444; flex-shrink:0; }
.resize-controls input { width:52px; padding:3px; border-radius:4px; border:1px solid #555; background:#111; color:#fff; text-align:center; font-size:12px; }
.toolbar-sep { width:1px; height:24px; background:#444; flex-shrink:0; margin:0 2px; }
#toggle-sidebar-btn,#toggle-boxes-btn { background:#2a2a2a; color:#aaa; border:1px solid #444; font-size:11px; padding:5px 9px; }
#toggle-sidebar-btn:hover,#toggle-boxes-btn:hover { background:#3a3a3a; color:#fff; }
#toggle-boxes-btn.hidden-mode { background:#f59e0b; color:#111; }
#renumber-btn { background:#f97316; color:#fff; font-size:11px; padding:5px 9px; }
.tab { padding:10px 16px; color:#888; cursor:pointer; border-bottom:3px solid transparent; font-size:13px; font-weight:700; white-space:nowrap; user-select:none; display:flex; align-items:center; gap:5px; }
.tab:hover { color:#ddd; background:#252525; }
.tab.active { color:#fff; border-bottom-color:#4f46e5; background:#222; }
.tab-live { color:#10b981; } .tab-live.active { border-bottom-color:#10b981; }
.tab.drag-over { background:#2a2a5a; border-left:3px solid #4f46e5; }
.tab-ver-dot { width:6px; height:6px; border-radius:50%; background:#f59e0b; display:none; }
.main-wrap { display:flex; flex:1; overflow:hidden; }
#thumbnail-sidebar { width:200px; background:#1e1e1e; border-right:1px solid #333; display:none; flex-direction:column; overflow-y:auto; flex-shrink:0; }
#thumbnail-sidebar.visible { display:flex; }
.sidebar-header { padding:10px 12px; font-size:11px; font-weight:700; color:#888; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center; }
.sidebar-header button { background:none; border:none; color:#888; font-size:14px; cursor:pointer; padding:2px 5px; border-radius:3px; }
.sidebar-header button:hover { background:#333; color:#fff; }
.thumb-item { padding:10px 12px; cursor:pointer; border-bottom:1px solid #2a2a2a; transition:background .15s; display:flex; flex-direction:column; gap:5px; }
.thumb-item:hover { background:#2a2a2a; }
.thumb-item.active { background:#252545; border-left:3px solid #4f46e5; }
.thumb-preview { width:100%; background:#fff; border-radius:4px; overflow:hidden; border:1px solid #444; }
.thumb-preview iframe { width:480px; height:800px; border:none; transform-origin:top left; pointer-events:none; display:block; }
.thumb-label { font-size:11px; color:#aaa; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-left:5px; }
.left-pane { flex:1; display:flex; justify-content:center; align-items:flex-start; background:#2c2f33; padding:20px; overflow:auto; }
#app-mockup { width:480px; height:800px; background:#fff; overflow:hidden; position:relative; box-shadow:0 10px 30px rgba(0,0,0,.5); border-radius:10px; flex-shrink:0; }
#html-loader-ui { display:flex; flex-direction:column; align-items:center; height:100%; padding:20px; background:#fff; text-align:center; overflow-y:auto; }
#html-loader-ui h3 { margin-top:10px; color:#333; font-size:15px; }
#html-loader-ui textarea { width:100%; height:200px; margin:10px 0; padding:10px; border:1px solid #ccc; border-radius:6px; resize:vertical; font-family:monospace; font-size:11px; }
.file-upload-wrapper { width:100%; padding:14px; border:2px dashed #4f46e5; border-radius:8px; margin-bottom:10px; background:#f5f5ff; text-align:left; }
.json-upload-wrapper { width:100%; padding:14px; border:2px dashed #10b981; border-radius:8px; margin-bottom:10px; background:#ecfdf5; text-align:left; }
.clear-file-btn { padding:4px 8px; font-size:11px; background:#ef4444; color:#fff; border:none; border-radius:4px; cursor:pointer; }
#live-iframe  { width:100%; height:100%; border:none; display:none; background:#fff; }
#scene-iframe { width:100%; height:100%; border:none; display:none; background:#fff; }
#scene-interaction-layer { position:absolute; inset:0; z-index:9998; display:none; pointer-events:none; overflow:hidden; }
#scene-interaction-layer.drag-active { pointer-events:auto !important; }
#scene-interaction-layer.boxes-hidden .red-box,
#scene-interaction-layer.boxes-hidden .highlight-box,
#scene-interaction-layer.boxes-hidden .text-box { opacity:.15; pointer-events:none; }
#add-tool-overlay { position:absolute; inset:0; z-index:9999; display:none; }
.select-mode-active #add-tool-overlay { display:block; cursor:crosshair; pointer-events:auto; }
.right-pane { width:540px; min-width:400px; background:#fff; border-left:1px solid #ddd; display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
.guide-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#888; text-align:center; line-height:1.6; padding:20px; }
#spec-editor-wrap { display:none; flex-direction:column; height:100%; overflow:hidden; }
.spec-header { background:#f8f9fa; padding:12px 16px; border-bottom:2px solid #222; display:flex; flex-direction:column; gap:8px; flex-shrink:0; }
.spec-header-row { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.spec-header input.title-input { font-size:15px; font-weight:900; border:none; background:transparent; flex:1; border-bottom:1px dashed #ccc; padding:2px; outline:none; min-width:120px; }
.version-selector { padding:3px 7px; border-radius:4px; border:1px solid #d1d5db; font-size:11px; background:#fff; cursor:pointer; outline:none; max-width:160px; }
.btn-ver-new { background:#4f46e5; color:#fff; font-size:10px; padding:3px 7px; border-radius:4px; }
.btn-ver-new:hover { background:#3730a3; }
.btn-ver-del { background:#fee2e2; color:#ef4444; border:1px solid #fca5a5; font-size:10px; padding:3px 7px; border-radius:4px; }
.btn-ver-del:hover { background:#fca5a5; color:#fff; }
.status-tag { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; cursor:pointer; border:2px solid transparent; transition:.15s; }
.status-tag.none        { background:#f0f0f0; color:#888; border-color:#ddd; }
.status-tag.reviewing   { background:#fef3c7; color:#92400e; border-color:#fbbf24; }
.status-tag.in-progress { background:#dbeafe; color:#1e40af; border-color:#3b82f6; }
.status-tag.done        { background:#d1fae5; color:#065f46; border-color:#10b981; }
.status-tag.hold        { background:#fee2e2; color:#991b1b; border-color:#ef4444; }
.status-tag.active-tag  { box-shadow:0 0 0 2px rgba(0,0,0,.2); transform:scale(1.05); }
.page-memo-area { display:none; padding:10px 16px; background:#fffbeb; border-bottom:1px solid #fde68a; }
.page-memo-area.visible { display:block; }
.page-memo-area textarea { width:100%; border:1px solid #fde68a; border-radius:4px; padding:6px; font-size:12px; resize:vertical; min-height:55px; outline:none; font-family:inherit; }
.page-memo-area label { font-size:11px; font-weight:700; color:#92400e; display:block; margin-bottom:4px; }
.spec-table-scroll { overflow-y:auto; flex:1; scroll-behavior:smooth; }
.spec-table { width:100%; border-collapse:collapse; }
.spec-table th,.spec-table td { border-bottom:1px solid #ddd; border-right:1px solid #ddd; padding:8px 10px; font-size:12px; text-align:left; vertical-align:top; line-height:1.5; color:#333; }
.spec-table th { background:#f4f4f6; width:50px; text-align:center; font-weight:700; color:#555; }
.spec-title-row th,.spec-title-row td { background:#fff4f4; border-top:2px solid #d93025; border-bottom:1px solid #d93025; }
.spec-title-row td { font-weight:800; color:#d93025; font-size:13px; }
@keyframes rowHL { 0%{background:rgba(217,48,37,.25)} 100%{background:transparent} }
.row-highlight { animation:rowHL 1.6s ease forwards; }
.row-btns { display:flex; flex-direction:column; gap:3px; }
.btn-del-box    { background:#fee2e2; color:#ef4444; border:1px solid #f87171; padding:3px 6px; border-radius:4px; font-size:10px; cursor:pointer; font-weight:bold; transition:.15s; }
.btn-del-box:hover    { background:#fca5a5; color:#fff; }
.btn-add-row    { background:#e0f2fe; color:#0369a1; border:1px solid #7dd3fc; padding:3px 6px; border-radius:4px; font-size:10px; cursor:pointer; font-weight:bold; transition:.15s; }
.btn-add-row:hover    { background:#bae6fd; }
.btn-img-attach { background:#f0fdf4; color:#166534; border:1px solid #86efac; padding:3px 6px; border-radius:4px; font-size:10px; cursor:pointer; font-weight:bold; transition:.15s; }
.btn-img-attach:hover { background:#bbf7d0; }
.btn-link       { background:#ede9fe; color:#5b21b6; border:1px solid #c4b5fd; padding:3px 6px; border-radius:4px; font-size:10px; cursor:pointer; font-weight:bold; transition:.15s; }
.btn-link:hover { background:#ddd6fe; }
.link-hint { font-size:9px; color:#aaa; display:block; margin-top:1px; }
.row-drag-handle { cursor:grab; color:#bbb; user-select:none; font-size:14px; padding:0 3px; display:inline-block; }
.row-drag-handle:active { cursor:grabbing; }
.img-block { position:relative; display:inline-block; margin:4px 0; user-select:none; }
.img-block img { display:block; border-radius:4px; border:1px solid #ddd; min-width:40px; min-height:40px; }
.img-block:hover img { outline:2px solid #3b82f6; }
.img-block-del { position:absolute; top:-6px; right:-6px; background:#ef4444; color:#fff; border:none; border-radius:50%; width:18px; height:18px; font-size:10px; cursor:pointer; display:none; align-items:center; justify-content:center; font-weight:bold; padding:0; z-index:2; }
.img-block:hover .img-block-del { display:flex; }
.img-resize-handle { position:absolute; width:10px; height:10px; background:#3b82f6; border:1px solid #fff; border-radius:2px; z-index:3; display:none; }
.img-block:hover .img-resize-handle { display:block; }
.img-resize-handle.br { bottom:-4px; right:-4px; cursor:nwse-resize; }
.img-resize-handle.bl { bottom:-4px; left:-4px; cursor:nesw-resize; }
.img-resize-handle.tr { top:-4px; right:-4px; cursor:nesw-resize; }
.img-resize-handle.tl { top:-4px; left:-4px; cursor:nwse-resize; }
.inline-link-chip { display:inline-flex; align-items:center; gap:2px; margin:2px 2px 0 0; vertical-align:middle; user-select:none; }
.inline-link-chip .link-item { display:inline-flex; align-items:center; background:#ede9fe; color:#5b21b6; border:1px solid #c4b5fd; border-radius:10px; padding:2px 8px; font-size:11px; text-decoration:none; cursor:pointer; transition:.15s; }
.inline-link-chip .link-item:hover { background:#ddd6fe; }
.inline-link-chip .lk-del { background:#ef4444; color:#fff; border:none; border-radius:50%; width:14px; height:14px; font-size:9px; cursor:pointer; display:none; align-items:center; justify-content:center; padding:0; flex-shrink:0; }
.inline-link-chip:hover .lk-del { display:flex; }
.td-link-area { display:flex; flex-wrap:wrap; gap:3px; margin-top:4px; padding-top:3px; border-top:1px dashed #e5e7eb; }
.red-box       { position:absolute; border:3px solid #d93025; z-index:9999; background:rgba(217,48,37,.05); resize:both; overflow:hidden; pointer-events:auto; }
.highlight-box { position:absolute; border:3px solid #3b82f6; background:rgba(59,130,246,.1); z-index:9999; resize:both; overflow:hidden; pointer-events:auto; }
.text-box      { position:absolute; border:1px dashed #aaa; background:rgba(255,255,255,.9); z-index:9999; resize:both; overflow:hidden; pointer-events:auto; padding:5px; font-size:13px; min-height:30px; }
.text-box:focus-within { border-color:#4f46e5; }
.red-badge   { position:absolute; top:0; left:0; background:#d93025; color:#fff; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:12px; pointer-events:auto; cursor:grab; z-index:10; user-select:none; }
.drag-handle { position:absolute; top:0; left:0; background:#555; color:#fff; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:13px; pointer-events:auto; cursor:grab; z-index:10; user-select:none; }
.red-badge:active,.drag-handle:active { cursor:grabbing; }
.box-del-btn  { position:absolute; top:0; right:0; width:18px; height:18px; background:#ef4444; color:#fff; text-align:center; line-height:18px; font-size:10px; cursor:pointer; display:none; font-weight:bold; z-index:10001; border-radius:0; }
.box-copy-btn { position:absolute; top:0; right:20px; width:18px; height:18px; background:#3b82f6; color:#fff; text-align:center; line-height:18px; font-size:10px; cursor:pointer; display:none; font-weight:bold; z-index:10001; border-radius:0; }
.red-box:hover .box-del-btn,.highlight-box:hover .box-del-btn,.text-box:hover .box-del-btn { display:block; }
.red-box:hover .box-copy-btn,.highlight-box:hover .box-copy-btn,.text-box:hover .box-copy-btn { display:block; }
.badge-inline { display:inline-block; background:#d93025; color:#fff; border-radius:50%; width:18px; height:18px; text-align:center; line-height:18px; font-size:10px; margin-right:5px; vertical-align:middle; flex-shrink:0; }
[contenteditable="true"] { outline:none; cursor:text; color:#222; }
[contenteditable="true"]:hover { background:rgba(0,0,0,.05); cursor:text; border-radius:3px; }
[contenteditable="true"]:focus { background:#fffde7; outline:1px dashed #ccc; border-radius:3px; cursor:text; }
.spec-table, .spec-table th, .spec-table td { cursor:default; color:#222; }
.spec-table td div[contenteditable] { cursor:text; }
.right-pane { caret-color:#222 !important; color:#222 !important; }
.right-pane * { caret-color:#222 !important; }
.spec-table-scroll { background:#fff; color:#222; }
.spec-table-scroll * { color:#222; }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:99998; }
.modal-box { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; border-radius:10px; padding:20px; z-index:99999; box-shadow:0 20px 60px rgba(0,0,0,.3); min-width:300px; }
#renumber-panel { border:2px solid #4f46e5; }
#renumber-panel h3 { margin:0 0 8px; font-size:14px; color:#4f46e5; }
#renumber-panel p  { font-size:11px; color:#888; margin:0 0 10px; }
#renumber-list { list-style:none; padding:0; margin:0 0 12px; max-height:280px; overflow-y:auto; }
#renumber-list li { padding:7px 10px; margin-bottom:3px; background:#f4f4f6; border-radius:5px; cursor:grab; font-size:12px; display:flex; align-items:center; gap:7px; border:1px solid #ddd; }
#renumber-list li .num-badge { background:#d93025; color:#fff; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900; flex-shrink:0; }
#rnm-btns { display:flex; gap:8px; }
#rnm-btns button { flex:1; padding:7px; font-size:12px; font-weight:bold; border:none; border-radius:5px; cursor:pointer; }
.btn-rnm-ok { background:#4f46e5; color:#fff; }
.btn-rnm-no { background:#e5e7eb; color:#333; }
#link-modal { border:2px solid #8b5cf6; min-width:320px; }
#link-modal h3 { margin:0 0 12px; font-size:14px; color:#8b5cf6; }
#link-modal label { font-size:11px; color:#555; font-weight:700; display:block; margin-bottom:3px; }
#link-modal input,#link-modal select { width:100%; padding:7px 9px; border:1px solid #d1d5db; border-radius:5px; font-size:12px; outline:none; margin-bottom:10px; }
#link-modal input:focus { border-color:#8b5cf6; }
#link-modal-btns { display:flex; gap:8px; }
#link-modal-btns button { flex:1; padding:8px; font-size:12px; font-weight:bold; border:none; border-radius:5px; cursor:pointer; }
.btn-lk-ok { background:#8b5cf6; color:#fff; }
.btn-lk-no { background:#e5e7eb; color:#333; }
.hidden-input { display:none; }
</style>
</head>
<body>
<div class="editor-toolbar" id="no-export-toolbar">
  <div class="toolbar-top">
    <button class="btn-capture"   id="capture-btn"    style="display:none;">📸 캡처</button>
    <button class="btn-add-blank" id="add-blank-btn"  style="display:none;">📄 빈 페이지</button>
    <button class="btn-dup-page"  id="dup-page-btn"   style="display:none;">⧉ 페이지 복제</button>
    <div class="toolbar-sep" id="sep1" style="display:none;"></div>
    <select id="tool-selector" style="display:none;">
      <option value="auto-box">🎯 자동 선택 (F12 방식)</option>
      <option value="number-box">1️⃣ 번호 박스 (표 연동)</option>
      <option value="highlight-box">🔲 강조 사각형</option>
      <option value="text-box">📝 텍스트 툴</option>
    </select>
    <button class="btn-add-box" id="add-box-btn"      style="display:none;">➕ 도구 추가</button>
    <button id="toggle-boxes-btn"                     style="display:none;">👁 박스 숨기기</button>
    <button id="renumber-btn"                         style="display:none;">🔢 번호 재정렬</button>
    <div class="toolbar-sep" id="sep2" style="display:none;"></div>
    <button class="btn-edit-html" id="edit-html-btn"  style="display:none;">✏️ HTML 수정</button>
    <button class="btn-exp-json"  id="exp-json-btn"   style="display:none;">💾 설정 저장</button>
    <button class="btn-exp-html"  id="exp-html-btn"   style="display:none;">🌐 배포본 다운로드</button>
    <div class="toolbar-sep" id="sep3" style="display:none;"></div>
    <button id="toggle-sidebar-btn"                   style="display:none;">🗂 썸네일</button>
    <div class="resize-controls" id="resize-controls" style="display:none;">
      <span>W</span><input type="number" id="mockup-w" value="480">
      <span>H</span><input type="number" id="mockup-h" value="800">
    </div>
    <div class="toolbar-sep" id="sep4" style="display:none;"></div>
    <button class="btn-del-page" id="del-page-btn"    style="display:none;">🗑 페이지 삭제</button>
    <span class="status-text" id="status-text">← 먼저 HTML 파일이나 코드를 로드해주세요.</span>
  </div>
  <div class="toolbar-bottom" id="tab-container">
    <div class="tab tab-live" id="tab-live" onclick="switchToLive()" style="display:none;">🟢 라이브 모드</div>
  </div>
</div>
<div class="main-wrap">
  <div id="thumbnail-sidebar">
    <div class="sidebar-header"><span>📋 페이지 목록</span><button onclick="closeSidebar()">✕</button></div>
    <div id="thumbnail-list"></div>
  </div>
  <div class="left-pane">
    <div id="app-mockup">
      <div id="html-loader-ui">
        <h3>기획할 HTML 화면 불러오기</h3>
        <div class="json-upload-wrapper">
          <label style="font-weight:bold;color:#059669;font-size:13px;">📂 기존 설정(.json) 불러오기</label><br><br>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="file" id="json-upload" accept=".json" style="font-size:12px;">
            <button class="clear-file-btn" id="clear-json-btn">취소</button>
          </div>
          <div style="font-size:11px;color:#059669;margin-top:5px;">저장했던 설정 파일을 불러와 바로 복구됩니다.</div>
        </div>
        <div class="file-upload-wrapper">
          <label style="font-weight:bold;color:#4f46e5;font-size:13px;">📁 HTML 파일 선택 (새로 시작)</label><br><br>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="file" id="file-upload" accept=".html,.txt" style="font-size:12px;">
            <button class="clear-file-btn" id="clear-html-btn">지우기</button>
          </div>
        </div>
        <div style="font-size:12px;color:#888;margin-bottom:6px;">또는 코드를 직접 붙여넣기</div>

// ★★★ 핵심 아이디어 (공유해주신 코드)
// getBoundingClientRect()를 매 프레임 직접 호출하면
// position:fixed 오버레이는 스크롤과 무관하게 뷰포트 좌표를 반환
// position:relative/absolute 요소는 스크롤에 따라 좌표가 바뀜
// → 어떤 요소든 그 요소의 현재 화면 위치에 박스가 정확히 고정됨!
function getElementPath(el){
  if(!el||el.nodeType!==1) return '';
  let path=[];
  while(el&&el.nodeType===1&&el.tagName.toLowerCase()!=='html'){
    let sel=el.tagName.toLowerCase();
    if(el.id&&/^[a-zA-Z][\w\-]*$/.test(el.id)){sel+='#'+el.id;path.unshift(sel);break;}
    let idx=1,sib=el.previousElementSibling;
    while(sib){if(sib.tagName===el.tagName)idx++;sib=sib.previousElementSibling;}
    if(idx>1) sel+=':nth-of-type('+idx+')';
    path.unshift(sel);
    el=el.parentNode;
  }
  return path.join(' > ');
}

});

function setIframeContent(iframe,html){

// ★ rAF 루프: 매 프레임 getBoundingClientRect()로 박스 위치 갱신
// position:fixed 오버레이 → 스크롤해도 뷰포트 기준 고정좌표 반환 → 박스 고정
// 일반 요소 → 스크롤 따라 좌표 변경 → 박스도 함께 이동
let lastBoxStates={};
function syncBoxPositions(){
  let sy=0,sx=0,cd=null;
  try{
    const cw=sceneIframe.contentWindow;cd=sceneIframe.contentDocument;
    sy=cw.scrollY||(cd&&cd.documentElement.scrollTop)||(cd&&cd.body&&cd.body.scrollTop)||0;
    sx=cw.scrollX||(cd&&cd.documentElement.scrollLeft)||(cd&&cd.body&&cd.body.scrollLeft)||0;
  }catch(e){}
  interLayer.querySelectorAll('.red-box,.highlight-box,.text-box').forEach(box=>{
    const id=box.id.replace('box-','');
    const c=boxAbsCoords[id];
    if(!c) return;
    let nT=c.top-sy,nL=c.left-sx,nW='',nH='';
    if(c.path&&cd){
      try{
        const el=cd.querySelector(c.path);
        if(el){
          const rect=el.getBoundingClientRect();
          if(rect.width>0||rect.height>0){
            nT=rect.top+c.ofsY;
            nL=rect.left+c.ofsX;
            if(c.matchSize){nW=rect.width;nH=rect.height;}
          }
        }
      }catch(e){}
    }
    const st=`${nT}_${nL}_${nW}_${nH}`;
    if(lastBoxStates[id]!==st){
      box.style.top=nT+'px';
      box.style.left=nL+'px';
      if(nW!=='') box.style.width=nW+'px';
      if(nH!=='') box.style.height=nH+'px';
      lastBoxStates[id]=st;
    }
  });
}
(function loop(){syncBoxPositions();requestAnimationFrame(loop);})();

safeEl('clear-html-btn')&&safeEl('clear-html-btn').addEventListener('click',()=>{

safeEl('load-html-btn')&&safeEl('load-html-btn').addEventListener('click',()=>{

let dragSrcTabId=null;
function addTabForScene(sceneId){
  const sc=scenes[sceneId];
  const tab=document.createElement('div');
  tab.className='tab';tab.id=`tab-${sceneId}`;
  tab.setAttribute('draggable','true');tab.dataset.sceneId=sceneId;
  const dot=document.createElement('span');
  dot.id=`tab-dot-${sceneId}`;dot.style.cssText='width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0;';
  updateTabDot(sceneId,sc.status||'none',dot);
  const vdot=document.createElement('span');vdot.className='tab-ver-dot';vdot.id=`tab-ver-dot-${sceneId}`;
  const label=document.createElement('span');label.id=`tab-label-${sceneId}`;label.innerText=`📄 ${sc.title}`;
  tab.append(dot,vdot,label);
  tab.addEventListener('click',()=>switchToScene(sceneId));
  tab.addEventListener('dragstart',()=>{dragSrcTabId=sceneId;tab.style.opacity='.5';});
  tab.addEventListener('dragend',()=>{tab.style.opacity='';document.querySelectorAll('.tab').forEach(t=>t.classList.remove('drag-over'));});
  tab.addEventListener('dragover',e=>{e.preventDefault();tab.classList.add('drag-over');});
  tab.addEventListener('dragleave',()=>tab.classList.remove('drag-over'));
  tab.addEventListener('drop',e=>{
    e.preventDefault();
    if(!dragSrcTabId||dragSrcTabId===sceneId)return;
    const keys=Object.keys(scenes);
    const si=keys.indexOf(dragSrcTabId),ti=keys.indexOf(sceneId);
    if(si<0||ti<0)return;
    keys.splice(si,1);keys.splice(ti,0,dragSrcTabId);
    const ns={};keys.forEach(k=>{ns[k]=scenes[k];});scenes=ns;
    const src=safeEl(`tab-${dragSrcTabId}`),tgt=safeEl(`tab-${sceneId}`);
    if(src&&tgt)tabContainer.insertBefore(src,ti>si?tgt.nextSibling:tgt);
    tab.classList.remove('drag-over');updateThumbnailSidebar();
  });
  tabContainer.appendChild(tab);updateThumbnailSidebar();
}
function updateTabDot(sceneId,status,el){
  const dot=el||safeEl(`tab-dot-${sceneId}`);if(!dot)return;
  const c={none:'#555',reviewing:'#fbbf24','in-progress':'#3b82f6',done:'#10b981',hold:'#ef4444'};
  dot.style.background=c[status]||'#555';
}

window.switchToLive=function(){
  if(loaderUi&&loaderUi.style.display!=='none')return;
  saveState();currentSceneId=null;

window.switchToScene=function(sceneId){
  if(loaderUi&&loaderUi.style.display!=='none')loaderUi.style.display='none';
  saveState();
  currentSceneId=sceneId;
  const sd=scenes[sceneId];
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const tab=safeEl(`tab-${sceneId}`);if(tab)tab.classList.add('active');
  liveIframe.style.display='none';
  interLayer.innerHTML='';
  lastBoxStates={};
  boxAbsCoords=sd.boxAbsCoords?JSON.parse(JSON.stringify(sd.boxAbsCoords)):{};
  setIframeContent(sceneIframe,sd.html);
  sceneIframe.style.display='block';
  interLayer.innerHTML=sd.boxesHtml||'';
  interLayer.style.display='block';
  interLayer.classList.remove('boxes-hidden');
  const tbBtn=safeEl('toggle-boxes-btn');
  if(tbBtn){tbBtn.innerText='👁 박스 숨기기';tbBtn.classList.remove('hidden-mode');}
  setTimeout(syncBoxPositions,80);setTimeout(syncBoxPositions,350);
  guideScreen.style.display='none';specWrap.style.display='flex';
  titleInput.value=sd.title;
  tableBody.innerHTML=sd.tableHtml||'';
  pageMemoText.value=sd.memo||'';
  pageMemoArea.classList.remove('visible');
  renderStatusTags(sd.status||'none');
  rebuildVersionSelector(sd);
  currentVerKey=sd.activeVersion||Object.keys(sd.versions||{})[0]||'v1';
  versionSel.value=currentVerKey;
  if(!window.IS_EXPORTED_HTML){showSceneTools();if(statusText)statusText.innerText='도구로 박스를 추가하거나 우측 표에 내용을 작성하세요.';}
  updateThumbnailSidebar();
};

function saveState(){
  if(!currentSceneId||!scenes[currentSceneId])return;
  const sd=scenes[currentSceneId];
  sd.boxesHtml=interLayer.innerHTML;
  sd.tableHtml=tableBody.innerHTML;
  sd.memo=pageMemoText.value;
  sd.boxAbsCoords=JSON.parse(JSON.stringify(boxAbsCoords));
  if(!sd.versions)sd.versions={};
  if(!sd.versions[currentVerKey])sd.versions[currentVerKey]={};
  sd.versions[currentVerKey].tableHtml=tableBody.innerHTML;
  sd.versions[currentVerKey].boxesHtml=interLayer.innerHTML;
  sd.versions[currentVerKey].boxAbsCoords=JSON.parse(JSON.stringify(boxAbsCoords));
  try{if(sceneIframe.contentDocument)sd.html=sceneIframe.contentDocument.documentElement.outerHTML;}catch(e){}
}

}
function renderStatusTags(active){
  document.querySelectorAll('.status-tag').forEach(el=>el.classList.toggle('active-tag',el.dataset.status===active));
}

function rebuildVersionSelector(sd){
  if(!sd.versions||Object.keys(sd.versions).length===0){
    const vk='v'+Date.now();
    sd.versions={[vk]:{label:'v1 (최초)',tableHtml:'',boxesHtml:'',boxAbsCoords:{}}};
    sd.activeVersion=vk;
  }
  versionSel.innerHTML='';
  Object.keys(sd.versions).forEach(vk=>{
    const opt=document.createElement('option');
    opt.value=vk;opt.innerText=sd.versions[vk].label||vk;
    versionSel.appendChild(opt);
  });
  const vdot=safeEl(`tab-ver-dot-${currentSceneId}`);
  if(vdot)vdot.style.display=Object.keys(sd.versions).length>1?'block':'none';
}
window.addNewVersion=function(){
  if(!currentSceneId)return;saveState();
  const sd=scenes[currentSceneId];if(!sd.versions)sd.versions={};
  const n=Object.keys(sd.versions).length+1;
  const label=prompt('새 버전 이름을 입력하세요.',`v${n}`);if(!label)return;
  const vk='v'+Date.now();
  sd.versions[vk]={label,tableHtml:tableBody.innerHTML,boxesHtml:interLayer.innerHTML,boxAbsCoords:JSON.parse(JSON.stringify(boxAbsCoords))};
  sd.activeVersion=vk;currentVerKey=vk;
  rebuildVersionSelector(sd);versionSel.value=vk;
};
window.deleteVersion=function(){
  if(!currentSceneId)return;
  const sd=scenes[currentSceneId];if(!sd.versions)return;
  const vkeys=Object.keys(sd.versions);
  if(vkeys.length<=1){alert('마지막 버전은 삭제할 수 없습니다.');return;}
  if(!confirm(`"${sd.versions[currentVerKey]?.label||currentVerKey}" 버전을 삭제하시겠습니까?`))return;
  delete sd.versions[currentVerKey];
  currentVerKey=Object.keys(sd.versions)[0];sd.activeVersion=currentVerKey;
  switchVersion(currentVerKey);rebuildVersionSelector(sd);
};
window.switchVersion=function(vk){
  if(!currentSceneId)return;saveState();

tableBody&&tableBody.addEventListener('mousedown',e=>{
  const handle=e.target.closest('.row-drag-handle');if(!handle)return;
  const srcTr=handle.closest('tr');if(!srcTr||srcTr.classList.contains('spec-title-row'))return;
  const srcTbody=srcTr.closest('tbody');if(!srcTbody)return;
  e.preventDefault();
  srcTr.style.opacity='0.3';
  const ph=document.createElement('tr');ph.id='__drag-ph__';
  const phTd=document.createElement('td');phTd.colSpan=3;
  phTd.style.cssText='padding:0;height:3px;background:#4f46e5;';ph.appendChild(phTd);
  function getTrAtPoint(x,y){
    srcTr.style.visibility='hidden';
    const el=document.elementFromPoint(x,y);
    srcTr.style.visibility='';
    if(!el)return null;
    const tr=el.closest('tr');
    if(!tr||tr===srcTr||tr===ph||tr.classList.contains('spec-title-row'))return null;
    if(tr.closest('tbody')!==srcTbody)return null;
    return tr;
  }
  const onMove=ev=>{
    const overTr=getTrAtPoint(ev.clientX,ev.clientY);if(!overTr)return;
    const rect=overTr.getBoundingClientRect();
    if(ev.clientY<rect.top+rect.height/2)overTr.parentNode.insertBefore(ph,overTr);
    else overTr.parentNode.insertBefore(ph,overTr.nextSibling);
  };
  const onUp=()=>{
    document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);
    srcTr.style.opacity='';
    if(ph.parentNode){ph.parentNode.insertBefore(srcTr,ph);ph.remove();}
    saveState();
  };
  document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
});

safeEl('renumber-btn')&&safeEl('renumber-btn').addEventListener('click',openRenumberPanel);
function openRenumberPanel(){
  saveState();
  const list=safeEl('renumber-list');list.innerHTML='';
  interLayer.querySelectorAll('.red-box').forEach((box,i)=>{
    const bid=box.id.replace('box-','');
    const row=safeEl('row-'+bid);
    let title='(제목 없음)';
    if(row){const sp=row.querySelector('.spec-title-row td span[contenteditable]');if(sp)title=sp.innerText||title;}
    const li=document.createElement('li');
    li.setAttribute('draggable','true');li.dataset.boxId=box.id;
    li.innerHTML=`<span class="num-badge">${i+1}</span><span>${title}</span>`;
    list.appendChild(li);
  });
  let dlLi=null;
  list.querySelectorAll('li').forEach(li=>{
    li.addEventListener('dragstart',()=>dlLi=li);
    li.addEventListener('dragover',e=>e.preventDefault());
    li.addEventListener('drop',e=>{
      e.preventDefault();if(!dlLi||dlLi===li)return;
      const all=[...list.querySelectorAll('li')];
      const si=all.indexOf(dlLi),ti=all.indexOf(li);
      list.insertBefore(dlLi,si>ti?li:li.nextSibling);
      list.querySelectorAll('li').forEach((l,idx)=>l.querySelector('.num-badge').innerText=idx+1);
    });
  });
  safeEl('renumber-overlay').style.display='block';
  safeEl('renumber-panel').style.display='block';
}
window.closeRenumberPanel=function(){safeEl('renumber-overlay').style.display='none';safeEl('renumber-panel').style.display='none';};
window.applyRenumber=function(){
  safeEl('renumber-list').querySelectorAll('li').forEach((li,idx)=>{
    const box=safeEl(li.dataset.boxId);if(!box)return;
    const rb=box.querySelector('.red-badge');if(rb)rb.innerText=idx+1;
    const bid=li.dataset.boxId.replace('box-','');
    const row=safeEl('row-'+bid);
    if(row){const ib=row.querySelector('.badge-inline');if(ib)ib.innerText=idx+1;interLayer.appendChild(box);tableBody.appendChild(row);}

document.addEventListener('mousedown',e=>{
  const badge=e.target.closest('.red-badge');
  const handle=e.target.closest('.drag-handle');
  const trigger=badge||handle;if(!trigger)return;
  if(e.target.closest('.img-resize-handle'))return;
  draggingBox=trigger.closest('.red-box,.highlight-box,.text-box');if(!draggingBox)return;
  const rect=draggingBox.getBoundingClientRect();
  dragOfsX=e.clientX-rect.left;dragOfsY=e.clientY-rect.top;
  interLayer.classList.add('drag-active');
  e.preventDefault();
});
document.addEventListener('mousemove',e=>{
  if(!draggingBox)return;
  const rect=mockup.getBoundingClientRect();
  const newLeft=e.clientX-rect.left-dragOfsX;
  const newTop=e.clientY-rect.top-dragOfsY;
  draggingBox.style.left=newLeft+'px';
  draggingBox.style.top=newTop+'px';
});
document.addEventListener('mouseup',()=>{
  if(!draggingBox)return;
  const bid=draggingBox.id.replace('box-','');
  let sy=0,sx=0,cd=null;
  try{
    const cw=sceneIframe.contentWindow;cd=sceneIframe.contentDocument;
    sy=cw.scrollY||(cd&&cd.documentElement.scrollTop)||(cd&&cd.body&&cd.body.scrollTop)||0;
    sx=cw.scrollX||(cd&&cd.documentElement.scrollLeft)||(cd&&cd.body&&cd.body.scrollLeft)||0;
  }catch(e){}
  const screenLeft=parseFloat(draggingBox.style.left)||0;
  const screenTop=parseFloat(draggingBox.style.top)||0;
  draggingBox.style.display='none';
  const iframeRect=sceneIframe.getBoundingClientRect();
  const boxRect=draggingBox.getBoundingClientRect();
  const ifX=(boxRect.left+boxRect.width/2)-iframeRect.left;
  const ifY=(boxRect.top+boxRect.height/2)-iframeRect.top;
  let targetEl=null;
  try{if(cd)targetEl=cd.elementFromPoint(ifX,ifY);}catch(er){}
  draggingBox.style.display='';
  let path=null,ofsX=0,ofsY=0;
  const matchSize=boxAbsCoords[bid]?.matchSize||false;
  if(targetEl){
    path=getElementPath(targetEl);
    const tRect=targetEl.getBoundingClientRect();
    ofsX=screenLeft-tRect.left;
    ofsY=screenTop-tRect.top;
  }
  boxAbsCoords[bid]={top:screenTop+sy,left:screenLeft+sx,path,ofsX,ofsY,matchSize:false};
  draggingBox=null;interLayer.classList.remove('drag-active');saveState();
});
